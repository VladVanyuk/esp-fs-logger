<!DOCTYPE html>
<html>
<head>
  <meta content="width=device-width, initial-scale=1" name="viewport" charset="utf-8">
  <title>Logs List</title>
  <link rel="stylesheet" href="assets/css/custom_csv.css" />
</head>
  <body>
    <main>
      <div id="page-wrapper" class="clearfix">
        <h1>Drone LOGS list interface</h1>
        <div class=container>
          <div id="files">
            <ul id="file-list"></ul>
            <div class="field">
              <input type="text" id="csv-path" name="path" value='/logs/csv/'>
              <button id="load-list">Load list</button><br><br>
              <button id="download-csv">Download</button>
              <button id="save-csv">Save CSV</button>
            </div>
            <hr>
            <!-- <input type="button" onclick="deleteAll()" value="Delete all files" class="delete-all"> todo bogdan--> 
            <button onclick="deleteAll()" class="delete-all">Delete all files</button>
            <hr>
          </div>
          <div class="scroll-buttons">
            <button id="scroll-up">▲</button>
            <button id="scroll-down">▼</button>
            <button id="scroll-left">◄</button>
            <button id="scroll-right">►</button>
          </div>
          <div id="content">
            <div class="tables text-center" id="csv-table"></div>
          </div>
        </div>
        <figure class="highcharts-figure">
          <canvas id="chart-container"></canvas>
        </figure>
      </div>
    </main>
    <script src="assets/js/csv.js"></script>
    <script src="assets/js/index.js"></script>
    <script src="assets/js/chart.js"></script>
  </body>
</html>
